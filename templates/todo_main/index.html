{% extends "todo_main/base.html" %}

{% block content %}
<div class="card shadow p-4">
    <h4 class="mb-3">Add New Task</h4>

    <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <input type="text" name="task" class="form-control" placeholder="Enter task..." required>
        <button class="btn btn-success">Add</button>
    </form>
</div>

<div class="mt-4">
    <h4>Your Tasks</h4>

    {% if todos %}
        <ul class="list-group mt-3">
            {% for task in todos %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ task.task }}
                    <div>
                        <a href="{% url 'edit' task.id %}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="{% url 'delete' task.id %}" class="btn btn-danger btn-sm">Delete</a>
                    </div>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="text-muted mt-3">No tasks yet</p>
    {% endif %}
</div>
{% endblock %}
